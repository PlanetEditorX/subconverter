dns:
  enable: true
  ipv6: false
  enhanced-mode: redir-host
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
  default-nameserver:
    - 223.5.5.5
    - 1.1.1.1

proxy-providers:
  Sub-store:
    type: http
    url: "url"
    path: ./proxy_provider/provider_dialer.yaml
    proxy: DIRECT
    interval: 86400
    health-check:
      enable: true
      interval: 300
      url: https://g.cn/generate_204
    override:
      skip-cert-verify: true
      udp: true

anchor:
  # 策略组类型模板 - 定义不同的策略组基础配置
  BaseURL-test: &BaseURL-test {type: smart, include-all: true, tolerance: 20, interval: 120, url: https://cp.cloudflare.com/generate_204, hidden: true}
  BaseURL-control: &BaseURL-control {type: smart, include-all: true, tolerance: 20, interval: 120, url: https://cp.cloudflare.com/generate_204}
  BaseDIRECT: &BaseDIRECT {type: select, hidden: true}
  # 节点筛选正则表达式 - 基于地理位置和关键词过滤
  FilterHK: &FilterHK '^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG)).*$'
  FilterSG: &FilterSG '^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP)).*$'
  FilterJP: &FilterJP '^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK)).*$'
  FilterUS: &FilterUS '^(?=.*(?i)(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD)).*$'
  FilterAI: &FilterAI '^(?=.*(?i)(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD|VPS|AI)).*$'
  FilterTW: &FilterTW '^(?=.*(?i)(台|🇹🇼|TW|tai|TPE|TSA|KHH)).*$'
  Filter6B: &Filter6B '^(?=.*(?i)(6B)).*$'
  FilterMM: &FilterMM '^(?=.*(?i)(MM)).*$'
  FilterVPS: &FilterVPS '^(?=.*(?i)(VPS)).*$'
  FilterBEST: &FilterBEST '^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG|台|🇹🇼|TW|tai|TPE|TSA|KHH|日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK|坡|🇸🇬|SG|Sing|SIN|XSP)).*$'

  # 策略组代理列表模板 - 预定义的代理节点优先级排序
  SelectAU: &SelectAU {type: url-test, include-all: true, tolerance: 20, interval: 120, filter: "^((?!(直连)).)*$"}
  SelectMS: &SelectMS {type: select, proxies: [香港节点, 美国节点, 日本节点, 新加坡节点, 台湾节点, 自动选择, VPS节点, MM节点, 6B节点, 全球直连], use: [Sub-store]}
  SelectMH: &SelectMH {type: select, proxies: [台湾节点, 香港节点, 美国节点, 新加坡节点, 日本节点, 手动选择, 自动选择, VPS节点, MM节点, 6B节点, 全球直连], use: [Sub-store]}
  SelectHK: &SelectHK {type: select, proxies: [香港节点, 美国节点, 新加坡节点, 日本节点, 台湾节点, 手动选择, 自动选择, VPS节点, MM节点, 6B节点, 全球直连]}
  SelectUS: &SelectUS {type: select, proxies: [美国节点, AI节点, 香港节点, 新加坡节点, 日本节点, 台湾节点, 手动选择, 自动选择, VPS节点, MM节点, 6B节点, 全球直连]}
  SelectSG: &SelectSG {type: select, proxies: [新加坡节点, 香港节点, 美国节点, 日本节点, 台湾节点, 手动选择, 自动选择, VPS节点, MM节点, 6B节点, 全球直连]}
  SelectJP: &SelectJP {type: select, proxies: [日本节点, 香港节点, 美国节点, 新加坡节点, 台湾节点, 手动选择, 自动选择, VPS节点, MM节点, 6B节点, 全球直连]}
  SelectTW: &SelectTW {type: select, proxies: [台湾节点, 香港节点, 美国节点, 新加坡节点, 日本节点, 手动选择, 自动选择, VPS节点, MM节点, 6B节点, 全球直连]}
  SelectDT: &SelectDT {type: select, proxies: [全球直连, 手动选择, 自动选择]}
  SelectAD: &SelectAD {type: select, proxies: [REJECT, DIRECT]}

  # 规则提供者相关锚点
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}

